version: "3.9"

services:
  polybot:
    build: .
    container_name: polybot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data        # SQLite DB persistence
      - ./logs:/app/logs        # Log files
    command: python main.py --mode dryrun --capital 10
    # Override for paper:  command: python main.py --mode paper --capital 10
    # Override for live:   command: python main.py --mode live --capital 10
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "7"
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('data/polybot.db').execute('SELECT 1')"]
      interval: 60s
      timeout: 10s
      retries: 3
